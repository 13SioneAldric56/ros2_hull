    # See https://github.com/cra-ros-pkg/robot_localization/issues/887
    qos_overrides:
      /odometry/gps:
        subscription:
          reliability: reliable
          depth: 10
      /odometry/local:
        subscription:
          reliability: reliable
          depth: 10
      /odometry/global:
        publisher:
          reliability: best_effort
          depth: 10
    frequency: 30.0
    sensor_timeout: 1.0
    two_d_mode: true
    transform_time_offset: 0.0
