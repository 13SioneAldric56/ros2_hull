# Dual EKF + navsat for GPS/IMU open-water navigation (no wheel encoders).
# Local EKF: IMU yaw + gyro only -> odom->base_link
# Global EKF: local odom velocities + GPS position + IMU (official map filter pattern)

ekf_filter_node_odom:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 1.0
    two_d_mode: true
    transform_time_offset: 0.0
    transform_timeout: 0.5
    print_diagnostics: true
    debug: false
    publish_tf: true
    publish_acceleration: false
    reset_on_time_jump: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
