# Shared navigation parameters (localization + Nav2 + goal bridge).

gps_velocity_adapter:
  ros__parameters:
    vel_topic: "/vel"
    output_topic: "/gps/twist"
    min_speed_mps: 0.05

gps_imu_fusion:
  ros__parameters:
    map_frame: "map"
    base_link_frame: "base_link"
    fix_topic: "/fix"
    imu_topic: "/imu/data"
    odom_topic: "/odometry/global"
    fused_path_topic: "/fused_path"
    publish_tf: true
    publish_fused_path: true
    path_min_distance: 0.5
    min_fix_status: 0

gps_navigator:
  ros__parameters:
    map_frame: "map"
    odom_topic: "/odometry/global"
    fix_topic: "/fix"
    goal_topic: "/navigation/goal"
    cancel_topic: "/navigation/cancel"
    plan_topic: "/plan"
    cmd_vel_topic: "/cmd_vel"
    arrival_radius_m: 2.0
    max_linear_speed: 0.5
    max_angular_speed: 1.0
    heading_gain: 1.5
    slowdown_radius_m: 10.0
    min_fix_status: 0
    publish_cmd_vel: true
    control_rate_hz: 10.0

gps_goal_bridge:
  ros__parameters:
    map_frame: "map"
    base_link_frame: "base_link"
    goal_topic: "/navigation/goal"
    cancel_topic: "/navigation/cancel"
    from_ll_service: "/fromLL"
    navigate_action: "navigate_to_pose"
    arrival_radius_m: 5.0
    goal_timeout_s: 600.0

cmd_vel_stub:
  ros__parameters:
    cmd_vel_topic: "/cmd_vel"
    cmd_vel_out_topic: "/cmd_vel/actuator"
    cancel_topic: "/navigation/cancel"
    watchdog_timeout_s: 0.5
    log_interval_s: 2.0
    republish_for_actuator: false
